events {}

http {
    client_max_body_size 5000M;
    upstream frontends {
        server front1:3000;
    }
    upstream backends {
        server back1:3001;
    }
    upstream docs_servers {
        server docs1:3002;
    }

    # HTTP -> HTTPS (avec support ACME challenge)
    server {
        listen 80;
        server_name awdpay.com www.awdpay.com docs.awdpay.com sandboxapi.awdpay.com vps84614.serveur-vps.net;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }


	# HTTPS pour sandboxapi.awdpay.com
	server {
	    listen 443 ssl;
	    server_name sandboxapi.awdpay.com;
	    ssl_certificate     /etc/letsencrypt/live/sandboxapi.awdpay.com/fullchain.pem;
	    ssl_certificate_key /etc/letsencrypt/live/sandboxapi.awdpay.com/privkey.pem;
	    ssl_protocols TLSv1.2 TLSv1.3;
	    ssl_prefer_server_ciphers on;
	    ssl_ciphers HIGH:!aNULL:!MD5;

	    location / {
	        proxy_pass         http://chic_transfer_api:8000;
	        proxy_set_header   Host $host;
	        proxy_set_header   X-Real-IP $remote_addr;
	        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
	        proxy_set_header   X-Forwarded-Proto $scheme;
	        proxy_read_timeout 60s;
	    }
	}

    # HTTPS pour awdpay.com (canonique)
    server {
        listen 443 ssl;
        server_name awdpay.com;
        ssl_certificate     /etc/letsencrypt/live/awdpay.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/awdpay.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers HIGH:!aNULL:!MD5;
        location / {
            proxy_pass http://frontends;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-proto $scheme;
        }
        location /sockjs-node {
            proxy_pass http://frontends;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
        }
        location /api {
            client_max_body_size 100M;
            proxy_pass http://backends;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            rewrite /api/(.*) /$1 break;
            proxy_hide_header Cross-Origin-Resource-Policy;
            proxy_hide_header Cross-Origin-Embedder-Policy;
            add_header Cross-Origin-Resource-Policy "cross-origin" always;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "*" always;
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

    }

    # HTTPS pour www.awdpay.com
    server {
        listen 443 ssl;
        server_name www.awdpay.com;
        ssl_certificate     /etc/letsencrypt/live/www.awdpay.com-0001/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/www.awdpay.com-0001/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location /api {
            client_max_body_size 100M;
            proxy_pass http://backends;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            rewrite /api/(.*) /$1 break;
            proxy_hide_header Cross-Origin-Resource-Policy;
            proxy_hide_header Cross-Origin-Embedder-Policy;
            add_header Cross-Origin-Resource-Policy "cross-origin" always;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "*" always;
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        location / {
            return 301 https://awdpay.com$request_uri;
        }
    }

    # HTTPS pour docs.awdpay.com
    server {
        listen 443 ssl;
        server_name docs.awdpay.com;
        ssl_certificate     /etc/letsencrypt/live/docs.awdpay.com-0001/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/docs.awdpay.com-0001/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers HIGH:!aNULL:!MD5;
        location / {
            proxy_pass http://docs_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
        }
    }
        # HTTPS pour vps84614.serveur-vps.net
        server {
            listen 443 ssl;
            server_name vps84614.serveur-vps.net;
            ssl_certificate     /etc/letsencrypt/live/vps84614.serveur-vps.net/fullchain.pem;
            ssl_certificate_key /etc/letsencrypt/live/vps84614.serveur-vps.net/privkey.pem;
            ssl_protocols TLSv1.2 TLSv1.3;
            ssl_prefer_server_ciphers on;
            ssl_ciphers HIGH:!aNULL:!MD5;
            location / {
                return 200 "SSL OK sur vps84614.serveur-vps.net\n";
                # ou proxy_pass http://ton_backend:PORT;
            }
        }
}
